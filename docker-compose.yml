services:
  relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/usr/src/app/db

  ec:
    build: .
    depends_on:
      - relay
    ports:
      - "50051:50051"
    environment:
      NOSTR_PRIVATE_KEY: ${NOSTR_PRIVATE_KEY}
      RELAY_URL: ws://relay:8080
      GRPC_BIND: 0.0.0.0:50051
      DATABASE_URL: /app/data/ec.db
      RULES_DIR: /app/rules
    volumes:
      - ec-data:/app/data

volumes:
  relay-data:
  ec-data:
